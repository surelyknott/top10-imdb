<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 20 IMDB Movies</title>
</head>
<body>
    <h1>Top 20 IMDB Movies</h1>
    <h3>Can you guess them all? (Updated March 2026)</h3>
    <div id="game-info">
        <p>Each movie starts at 10 points.</p>
        <p>Hint 1 shows the year, Hint 2 shows the director, and Hint 3 shows a quote.</p>
        <p>Each hint costs 2 points. After the third hint, you can reveal the answer for 0 points.</p>
    </div>

    <div id="game-container"></div>
    <div id="score-display">Score: 0</div>
    <div id="end-message"></div>
    <button id="reset-button" style="display:none;">Reset Game</button>

    <script src="main.js"></script>
</body>
</html>
